<section class="m2s2-cta-section">
  <div class="cta-card">
    <div class="cta-text">
      <h2 class="cta-title">{{ config().title }}</h2>
      <p class="cta-body">{{ config().body }}</p>
    </div>
    <a [routerLink]="config().route" class="cta-btn">{{ config().label }}</a>
  </div>
</section>
