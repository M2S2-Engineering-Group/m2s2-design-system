<div class="table-panel">
  @if (totalCount() === 0) {
    <p class="dt-empty">{{ emptyMessage() }}</p>
  } @else {

    <div class="dt-toolbar">
      <!-- Search + status pills -->
      @if (statuses().length > 0) {
        <input
          class="dt-search"
          type="search"
          [placeholder]="searchPlaceholder()"
          [value]="searchValue()"
          (input)="searchChange.emit($any($event.target).value)">
        <div class="dt-pills">
          @for (s of statuses(); track s) {
            <button
              class="dt-pill"
              [class.dt-pill--active]="statusFilter() === s"
              (click)="statusChange.emit(s)">
              {{ getStatusLabel(s) }}
            </button>
          }
        </div>
        <span class="dt-count">{{ filteredCount() }} of {{ totalCount() }}</span>
      }

      <!-- Column toggle — pushed to the right -->
      @if (columnDefs().length > 0) {
        <div class="dt-col-wrap" #colWrap>
          <button class="dt-col-btn" (click)="showCols.set(!showCols())">&#9881; Columns</button>
          @if (showCols()) {
            <div class="dt-col-panel">
              @for (col of columnDefs(); track col.key) {
                <label class="dt-col-check">
                  <input type="checkbox" [checked]="colVisibility()[col.key]" (change)="colToggle.emit(col.key)">
                  {{ col.label }}
                </label>
              }
            </div>
          }
        </div>
      }
    </div>

    <div class="dt-scroll">
      <ng-content />
    </div>

  }
</div>
