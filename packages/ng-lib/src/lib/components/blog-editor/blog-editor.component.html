<div class="be-root">

  <!-- ── Metadata ───────────────────────────────────────────────────────────── -->
  <section class="be-meta">

    <div class="be-field be-field--full">
      <label class="be-label">Title <span class="be-required">*</span></label>
      <input
        class="be-input"
        type="text"
        [ngModel]="title()"
        (ngModelChange)="onTitleChange($event)"
        placeholder="Post title…"
      />
    </div>

    <div class="be-field">
      <label class="be-label">Slug</label>
      <input
        class="be-input"
        type="text"
        [ngModel]="slug()"
        (ngModelChange)="slug.set($event); slugEdited = true"
        placeholder="post-slug"
      />
    </div>

    <div class="be-field">
      <label class="be-label" for="be-date">Date</label>
      <input
        id="be-date"
        class="be-input be-input--date"
        type="date"
        [ngModel]="date()"
        (ngModelChange)="date.set($event)"
      />
    </div>

    <div class="be-field be-field--full">
      <label class="be-label">Summary <span class="be-required">*</span></label>
      <textarea
        class="be-input be-input--textarea"
        rows="2"
        [ngModel]="summary()"
        (ngModelChange)="summary.set($event)"
        placeholder="Short description shown in blog listings…"
      ></textarea>
    </div>

    <div class="be-field be-field--full">
      <label class="be-label">Excerpt <span class="be-optional">(optional)</span></label>
      <textarea
        class="be-input be-input--textarea"
        rows="2"
        [ngModel]="excerpt()"
        (ngModelChange)="excerpt.set($event)"
        placeholder="Longer teaser for social previews…"
      ></textarea>
    </div>

    <div class="be-field">
      <label class="be-label">Tags</label>
      <div class="be-tags">
        @for (tag of tags(); track tag) {
          <span class="be-tag">
            {{ tag }}
            <button type="button" class="be-tag__remove" (click)="removeTag(tag)" aria-label="Remove tag">×</button>
          </span>
        }
        <input
          class="be-tag-input"
          type="text"
          [(ngModel)]="tagInput"
          (keydown)="onTagKeydown($event)"
          placeholder="Add tag, press Enter…"
        />
      </div>
    </div>

    <div class="be-field">
      <label class="be-label" for="be-reading-time">Reading time (min)</label>
      <input
        id="be-reading-time"
        class="be-input be-input--narrow"
        type="number"
        min="1"
        [ngModel]="readingTime()"
        (ngModelChange)="readingTime.set(+$event)"
      />
    </div>

    <div class="be-field be-field--cover">
      <label class="be-label">Cover Image</label>
      <div class="be-cover">
        @if (coverPreviewUrl() || coverImageUrl()) {
          <img
            class="be-cover__preview"
            [src]="coverPreviewUrl() ?? coverImageUrl()"
            alt="Cover preview"
          />
        }
        <label class="be-cover__pick">
          {{ (coverPreviewUrl() || coverImageUrl()) ? 'Replace' : 'Choose image' }}
          <input type="file" accept="image/*" (change)="onCoverChange($event)" hidden />
        </label>
      </div>
    </div>

    <div class="be-field-group-label">Series <span class="be-optional">(optional)</span></div>

    <div class="be-field be-field--full">
      <label class="be-label" for="be-series">Series</label>
      <select
        id="be-series"
        class="be-input be-input--select"
        [ngModel]="selectedSeriesKey()"
        (ngModelChange)="onSeriesKeyChange($event)"
      >
        <option value="none">— None —</option>
        @for (s of existingSeries(); track s.id) {
          <option [value]="s.id">{{ s.title }}</option>
        }
        <option value="__new__">+ New series…</option>
      </select>
    </div>

    @if (selectedSeriesKey() === '__new__') {
      <div class="be-field">
        <label class="be-label">Series ID</label>
        <input
          class="be-input"
          type="text"
          [ngModel]="seriesId()"
          (ngModelChange)="seriesId.set($event)"
          placeholder="e.g. go-backend"
        />
      </div>
      <div class="be-field">
        <label class="be-label">Series Title</label>
        <input
          class="be-input"
          type="text"
          [ngModel]="seriesTitle()"
          (ngModelChange)="seriesTitle.set($event)"
          placeholder="e.g. Go Backend Series"
        />
      </div>
    }

    @if (selectedSeriesKey() !== 'none') {
      <div class="be-field be-field--narrow-pair">
        <div>
          <label class="be-label" for="series-part">Part</label>
          <input
            id="series-part"
            class="be-input be-input--narrow"
            type="number"
            min="1"
            [ngModel]="seriesPart()"
            (ngModelChange)="seriesPart.set(+$event)"
          />
        </div>
        <div>
          <label class="be-label" for="series-total">Total Parts</label>
          <input
            id="series-total"
            class="be-input be-input--narrow"
            type="number"
            min="1"
            [ngModel]="seriesTotal()"
            (ngModelChange)="seriesTotal.set(+$event)"
          />
        </div>
      </div>
    }

  </section>

  <!-- ── Editor ─────────────────────────────────────────────────────────────── -->
  <section class="be-editor">

    <div class="be-toolbar" role="toolbar" aria-label="Formatting">
      <!-- Mobile pane toggle — hidden on desktop via CSS -->
      <div class="be-pane-toggle" role="group" aria-label="Editor mode">
        <button
          type="button"
          class="be-pane-toggle__btn"
          [class.be-pane-toggle__btn--active]="activePane() === 'write'"
          (click)="activePane.set('write')"
        >Write</button>
        <button
          type="button"
          class="be-pane-toggle__btn"
          [class.be-pane-toggle__btn--active]="activePane() === 'preview'"
          (click)="activePane.set('preview')"
        >Preview</button>
      </div>

      <div class="be-toolbar__tools">
        @for (item of toolbarItems; track item.label) {
          <button
            type="button"
            class="be-toolbar__btn"
            [title]="item.label"
            [attr.aria-label]="item.label"
            (click)="applyFormat(item)"
          >{{ item.icon }}</button>
        }
      </div>
    </div>

    <div class="be-panes">
      <div class="be-pane be-pane--write" [class.be-pane--hidden]="activePane() === 'preview'">
        <div class="be-pane__label">Markdown</div>
        <textarea
          #editorTextarea
          class="be-pane__textarea"
          [ngModel]="content()"
          (ngModelChange)="onContentChange($event)"
          placeholder="Write your post in markdown…"
          spellcheck="true"
        ></textarea>
      </div>

      <div class="be-pane be-pane--preview" [class.be-pane--hidden]="activePane() === 'write'">
        <div class="be-pane__label">Preview</div>
        <div class="be-pane__preview prose" [innerHTML]="renderedContent()"></div>
      </div>
    </div>

  </section>

  <!-- ── Footer ─────────────────────────────────────────────────────────────── -->
  <footer class="be-footer">
    <span class="be-footer__meta">~{{ readingTime() }} min read</span>
    <div class="be-footer__actions">
      <button
        type="button"
        class="be-export"
        [disabled]="!canPublish()"
        (click)="onExport()"
      >Export</button>
      <button
        type="button"
        class="be-publish"
        [disabled]="!canPublish()"
        (click)="onPublish()"
      >Publish Post</button>
    </div>
  </footer>

</div>
