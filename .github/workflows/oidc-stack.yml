name: Deploy OIDC role stack

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'infra/github-oidc/design-system-github-oidc.template.yaml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Update design system GitHub Actions role
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --stack-name m2s2-design-system-github-oidc \
            --template-file infra/github-oidc/design-system-github-oidc.template.yaml \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              WebBucketName=${{ secrets.S3_WEB_BUCKET }} \
              StorybookDistributionId=${{ secrets.STORYBOOK_DISTRIBUTION_ID || '*' }} \
            --no-fail-on-empty-changeset
