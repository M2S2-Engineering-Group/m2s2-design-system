name: CI

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Force run mode'
        required: true
        default: 'stories-only'
        type: choice
        options:
          - stories-only
          - storybook-infra
          - full
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'apps/**'
      - 'infra/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'apps/**'
      - 'infra/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  id-token: write
  contents: read

jobs:
  # ── Detect: classify what changed ─────────────────────────────────────────
  detect:
    name: Detect change type
    runs-on: ubuntu-latest
    outputs:
      stories_only:    ${{ steps.check.outputs.stories_only }}
      storybook_infra: ${{ steps.check.outputs.storybook_infra }}
      full:            ${{ steps.check.outputs.full }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Classify changed files
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            echo "stories_only=$(    [ "$MODE" = "stories-only"   ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "storybook_infra=$([ "$MODE" = "storybook-infra" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "full=$(           [ "$MODE" = "full"            ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD^"
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Infra-only
          NON_INFRA=$(echo "$CHANGED" | grep -vE '^infra/' || true)
          if [ -z "$NON_INFRA" ] && [ -n "$CHANGED" ]; then
            echo "stories_only=false"    >> "$GITHUB_OUTPUT"
            echo "storybook_infra=true"  >> "$GITHUB_OUTPUT"
            echo "full=false"            >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "storybook_infra=false" >> "$GITHUB_OUTPUT"

          # Stories-only: only .stories.ts / .stories.tsx changes
          NON_STORIES=$(echo "$CHANGED" | grep -vE '^packages/.*\.stories\.tsx?$' || true)
          if [ -z "$NON_STORIES" ] && [ -n "$CHANGED" ]; then
            echo "stories_only=true" >> "$GITHUB_OUTPUT"
            echo "full=false"        >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "stories_only=false" >> "$GITHUB_OUTPUT"

          echo "full=true" >> "$GITHUB_OUTPUT"

  # ── Build & test ──────────────────────────────────────────────────────────
  build:
    name: Build & test
    needs: [detect]
    if: needs.detect.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build models
        run: npm run build --workspace=packages/models

      - name: Build ng-lib
        run: npm run build --workspace=packages/ng-lib

      - name: Test ng-lib
        run: npm run test --workspace=packages/ng-lib -- --watch=false

      - name: Build react-lib
        run: npm run build --workspace=packages/react-lib

      - name: Test react-lib
        run: npm run test --workspace=packages/react-lib

      - name: Build vue-lib
        run: npm run build --workspace=packages/vue-lib

      - name: Test vue-lib
        run: npm run test --workspace=packages/vue-lib

  # ── Release: all packages (multi-semantic-release) ───────────────────────
  release:
    name: Release all packages
    needs: [detect, build]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.full == 'true' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: |
          npm run build --workspace=packages/models
          npm run build:prod --workspace=packages/ng-lib
          npm run build:prod --workspace=packages/react-lib
          npm run build:prod --workspace=packages/vue-lib

      - name: Sync with remote
        run: git pull --rebase origin main

      - name: Fetch tags
        run: git fetch --tags

      - name: Release
        run: |
          NPM_TOKEN="$NODE_AUTH_TOKEN" npx multi-semantic-release \
            --ignore-private-packages \
            packages/models \
            packages/ng-lib \
            packages/react-lib \
            packages/vue-lib \
            packages/tokens
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_PROVENANCE: 'true'

  # ── Deploy Storybook: full build ──────────────────────────────────────────
  deploy-storybook:
    name: Deploy Storybook
    needs: [detect, build]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.full == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build models
        run: npm run build --workspace=packages/models

      - name: Build ng-lib
        run: npm run build:prod --workspace=packages/ng-lib

      - name: Build Storybook
        run: npm run build:storybook

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync Storybook to S3
        run: |
          # Sync immutable hashed assets first (JS/CSS/fonts)
          aws s3 sync dist/storybook/ \
            s3://${{ secrets.S3_STORYBOOK_BUCKET }}/ \
            --delete \
            --exclude "*.html" --exclude "*.json" \
            --cache-control "max-age=31536000,immutable"
          # Sync entry files with no-cache so browsers always revalidate
          aws s3 sync dist/storybook/ \
            s3://${{ secrets.S3_STORYBOOK_BUCKET }}/ \
            --exclude "*" --include "*.html" --include "*.json" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STORYBOOK_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── Storybook sync: stories-only changes ─────────────────────────────────
  storybook-sync:
    name: Sync Storybook to S3
    needs: [detect]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.detect.outputs.stories_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build models
        run: npm run build --workspace=packages/models

      - name: Build ng-lib
        run: npm run build:prod --workspace=packages/ng-lib

      - name: Build Storybook
        run: npm run build:storybook

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync Storybook to S3
        run: |
          # Sync immutable hashed assets first (JS/CSS/fonts)
          aws s3 sync dist/storybook/ \
            s3://${{ secrets.S3_STORYBOOK_BUCKET }}/ \
            --delete \
            --exclude "*.html" --exclude "*.json" \
            --cache-control "max-age=31536000,immutable"
          # Sync entry files with no-cache so browsers always revalidate
          aws s3 sync dist/storybook/ \
            s3://${{ secrets.S3_STORYBOOK_BUCKET }}/ \
            --exclude "*" --include "*.html" --include "*.json" \
            --cache-control "no-cache"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STORYBOOK_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── Storybook infra: deploy CDK stack ─────────────────────────────────────
  deploy-storybook-stack:
    name: Deploy storybook CDK stack
    needs: [detect, build]
    if: always() && github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (needs.detect.outputs.storybook_infra == 'true' || needs.detect.outputs.full == 'true') && (needs.build.result == 'success' || needs.build.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: infra/storybook/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy storybook CDK stack
        working-directory: infra/storybook
        run: npx cdk deploy M2S2DesignSystemStorybookStack --require-approval never
        env:
          S3_STORYBOOK_BUCKET: ${{ secrets.S3_STORYBOOK_BUCKET }}
          STORYBOOK_CERT_ARN:  ${{ secrets.STORYBOOK_CERT_ARN }}
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION:  us-east-1

  # ── Notify CLI repo when libraries are released ───────────────────────────
  notify-cli:
    name: Notify m2s2-cli of new releases
    needs: [release]
    if: always() && github.ref == 'refs/heads/main' && needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: m2s2-cli
      - name: Dispatch template-sync to m2s2-cli
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: M2S2-Engineering-Group/m2s2-cli
          event-type: m2s2-libs-released
